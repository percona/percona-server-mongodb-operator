name: Feature request 🧭
description: Suggest an idea for this project (must be linked from roadmap)
labels: "feature-request"
body:
- type: markdown
  attributes:
    value: |
      We prioritize feature work from our **shared roadmap**. If this feature isn't there yet, add it first, then paste the link below.
      **Roadmap:** https://github.com/orgs/percona/projects/10

- type: input
  id: roadmap-link
  attributes:
    label: "Roadmap item link (required)"
    description: "URL of the card or item on the Percona Kubernetes Operators Roadmap. Add the idea there first if needed."
    placeholder: "https://github.com/orgs/percona/projects/10?card=..."
  validations:
    required: true

- type: textarea
  attributes:
    label: Proposal
    description: "What would you like to have as a feature"
    placeholder: "A clear and concise description of what you want to happen."
  validations:
    required: true
- type: textarea
  attributes:
    label: Use-Case
    description: "How would this help you?"
    placeholder: "Tell us more what you'd like to achieve."
  validations:
    required: false
- type: dropdown
  id: interested-in-implementing-the-feature
  attributes:
    label: Is this a feature you are interested in implementing yourself?
    options:
      - 'No'
      - 'Maybe'
      - 'Yes'
  validations:
    required: true
- type: textarea
  id: anything-else
  attributes:
    label: Anything else?
    description: "Let us know if you have anything else to share"
