apiVersion: psmdb.percona.com/v1
kind: PerconaServerMongoDB
metadata:
  name: some-name
spec:
  image:
  imagePullPolicy: Always
  updateStrategy: SmartUpdate
  tls:
    certManagementPolicy: userProvidedOnly
  backup:
    enabled: false
  replsets:
  - name: rs0
    affinity:
      antiAffinityTopologyKey: none
    resources:
      limits:
        cpu: 500m
        memory: 1G
      requests:
        cpu: 100m
        memory: 0.1G
    volumeSpec:
      persistentVolumeClaim:
        resources:
          requests:
            storage: 1Gi
    expose:
      enabled: false
      type: ClusterIP
    size: 3
  secrets:
    users: some-users
