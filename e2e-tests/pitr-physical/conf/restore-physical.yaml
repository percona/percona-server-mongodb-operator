apiVersion: psmdb.percona.com/v1
kind: PerconaServerMongoDBRestore
metadata:
  name: restore-backup-aws-s3-2
spec:
  clusterName: some-name
  backupName: backup-aws-s3-2
  pitr:
    pitrType: latest
  backupSource:
    type: physical
    destination: s3://operator-testing/psmdb-pitr-demand-backup-eks-credentials/2025-09-21T20:39:28Z
    s3:
      credentialsSecret: aws-s3-secret
      bucket: operator-testing
      prefix: psmdb-pitr-demand-backup-eks-credentials
      region: us-east-1
      insecureSkipTLSVerify: false