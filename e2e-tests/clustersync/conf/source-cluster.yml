apiVersion: psmdb.percona.com/v1
kind: PerconaServerMongoDB
metadata:
  name: source-cluster
spec:
  image:
  imagePullPolicy: Always
  unsafeFlags:
    replsetSize: true
    mongosSize: true
  secrets:
    users: source-users
  sharding:
    enabled: true
    configsvrReplSet:
      size: 1
      affinity:
        antiAffinityTopologyKey: none
      resources:
        limits:
          cpu: 300m
          memory: 0.5G
        requests:
          cpu: 100m
          memory: 0.1G
      volumeSpec:
        persistentVolumeClaim:
          resources:
            requests:
              storage: 1Gi
    mongos:
      size: 1
      affinity:
        antiAffinityTopologyKey: none
      expose:
        type: ClusterIP
      resources:
        limits:
          cpu: 300m
          memory: 0.5G
        requests:
          cpu: 100m
          memory: 0.1G
  replsets:
    - name: rs0
      size: 1
      affinity:
        antiAffinityTopologyKey: none
      resources:
        limits:
          cpu: 300m
          memory: 0.5G
        requests:
          cpu: 100m
          memory: 0.1G
      volumeSpec:
        persistentVolumeClaim:
          resources:
            requests:
              storage: 1Gi
