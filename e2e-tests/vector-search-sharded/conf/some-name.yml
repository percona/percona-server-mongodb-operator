apiVersion: psmdb.percona.com/v1
kind: PerconaServerMongoDB
metadata:
  finalizers:
    - percona.com/delete-psmdb-pvc
  name: some-name
spec:
  #platform: openshift
  image:
  imagePullPolicy: Always
  updateStrategy: SmartUpdate
  tls:
    mode: preferTLS
  backup:
    enabled: true
    image: perconalab/percona-server-mongodb-operator:main-backup
    storages:
      minio:
        type: s3
        s3:
          credentialsSecret: minio-secret
          region: us-east-1
          bucket: operator-testing
          endpointUrl: http://minio-service:9000/
          insecureSkipTLSVerify: false
  search:
    enabled: true
    image: mongodb/mongodb-community-search:latest
    size: 1
    resources:
      requests:
        cpu: "1"
        memory: 2Gi
    storage:
      persistentVolumeClaim:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 3Gi
  sharding:
    enabled: true
    configsvrReplSet:
      size: 3
      volumeSpec:
        persistentVolumeClaim:
          resources:
            requests:
              storage: 3Gi
      expose:
        enabled: false
    mongos:
      size: 1
      expose:
        type: ClusterIP
  replsets:
    - name: rs0
      affinity:
        antiAffinityTopologyKey: none
      resources:
        limits:
          cpu: 500m
          memory: 1G
        requests:
          cpu: 100m
          memory: 0.1G
      volumeSpec:
        persistentVolumeClaim:
          resources:
            requests:
              storage: 3Gi
      expose:
        enabled: false
        type: ClusterIP
      size: 3
      configuration: |
        operationProfiling:
          mode: slowOp
          slowOpThresholdMs: 100
        setParameter:
          ttlMonitorSleepSecs: 60
          wiredTigerConcurrentReadTransactions: 128
          wiredTigerConcurrentWriteTransactions: 128
        storage:
          engine: wiredTiger
          wiredTiger:
            collectionConfig:
              blockCompressor: snappy
            engineConfig:
              directoryForIndexes: false
              journalCompressor: snappy
            indexConfig:
              prefixCompression: true
  secrets:
    users: some-users
