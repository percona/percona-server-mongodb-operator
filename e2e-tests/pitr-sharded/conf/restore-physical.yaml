apiVersion: psmdb.percona.com/v1
kind: PerconaServerMongoDBRestore
metadata:
  name: restore-backup-aws-s3-4
spec:
  clusterName: some-name
  backupName: backup-aws-s3-3
  pitr:
    type: latest
  backupSource:
    type: physical
    destination:  s3://operator-testing/psmdb-test-natitest/2025-09-22T06:51:55Z
    s3:
      credentialsSecret: aws-s3-secret
      bucket: operator-testing
      prefix: psmdb-test-natitest
      region: us-east-1
      insecureSkipTLSVerify: false