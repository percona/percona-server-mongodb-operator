apiVersion: apps/v1
kind: Deployment
metadata:
  name: psmdb-client-mongosh
spec:
  replicas: 1
  selector:
    matchLabels:
      name: psmdb-client-mongosh
  template:
    metadata:
      labels:
        name: psmdb-client-mongosh
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: psmdb-client
          image: docker.io/percona/percona-server-mongodb:7.0
          imagePullPolicy: Always
          command:
          - sleep
          args:
          - "100500"
